name: pre-release build

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: false
        default: "23.05.5"
      version:
        description: "Version of this build."
        required: false
        default: ""
      publish_release:
        description: "Publish to GitHub Release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          VER="${{ github.event.inputs.openwrt_version }}"
          if [ -z "$VER" ]; then VER="23.05.5"; fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/x86/64"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(xz|zst)' | head -n1)"
          if [ -z "$SDK_NAME" ]; then
            echo "Cannot find SDK from: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Apply version to Makefile
        if: github.event.inputs.version != ''
        run: |
          VERSION='${{ github.event.inputs.version }}'
          awk -v ver="$VERSION" '
            BEGIN { replaced=0 }
            /^PKG_VERSION:=/ { print "PKG_VERSION:=" ver; replaced=1; next }
            { print }
            END { if (!replaced) exit 2 }
          ' Makefile > Makefile.tmp
          mv Makefile.tmp Makefile
          grep -n '^PKG_VERSION:=' Makefile

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: Download and extract SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.event.inputs.openwrt_version || '23.05.5' }}-x86-64-v2

      - name: Update and install required feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-smart-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-smart-srun/

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_PACKAGE_smart-srun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smart-srun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smart-srun-bundle=y" >> .config
          make defconfig

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-smart-srun/{clean,compile} -j1 V=s

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          echo "=== All ipk files ==="
          find openwrt/bin -type f -name '*.ipk' | sort
          echo "====================="
          for pattern in 'smart-srun_*.ipk' 'luci-app-smart-srun_*.ipk' 'luci-app-smart-srun-bundle_*.ipk'; do
            IPK="$(find openwrt/bin -type f -name "$pattern" | head -n1)"
            if [ -n "$IPK" ]; then
              cp -v "$IPK" "artifacts/$(basename "$IPK")"
            fi
          done
          if [ -z "$(ls artifacts/*.ipk 2>/dev/null)" ]; then
            echo "Failed: no ipk found."
            exit 1
          fi
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-srun-ipk
          path: artifacts/*.ipk

  publish:
    needs: build
    if: github.event.inputs.publish_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate release version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "version is required when publish_release=true"
            exit 1
          fi

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: smart-srun-ipk*
          merge-multiple: true

      - name: Prepare release asset directories
        run: |
          VERSION='${{ github.event.inputs.version }}'
          python scripts/release_assets.py prepare artifacts release-assets split-downloads "$VERSION" > release-assets-metadata.json
          echo "SPLIT_ZIP_NAME=smart-srun-split-packages-${VERSION}.zip" >> "$GITHUB_ENV"
          ls -lh release-assets/
          ls -lh split-downloads/

      - name: Compute split packages URL
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          VERSION='${{ github.event.inputs.version }}'
          SPLIT_PACKAGES_URL="$(python scripts/release_assets.py build-split-url "$OWNER" "$REPO" "$VERSION")"
          echo "SPLIT_PACKAGES_URL=${SPLIT_PACKAGES_URL}" >> "$GITHUB_ENV"

      - name: Render pre-release notes from template
        run: |
          VERSION='${{ github.event.inputs.version }}'
          OPENWRT_VERSION='${{ github.event.inputs.openwrt_version }}'
          if [ -z "$OPENWRT_VERSION" ]; then OPENWRT_VERSION='23.05.5'; fi
          COMPARE_REF="main...${VERSION}"

          python scripts/release_assets.py render-notes \
            .github/prerelease-template.md \
            prerelease-notes.md \
            "VERSION=${VERSION}" \
            "OPENWRT_VERSION=${OPENWRT_VERSION}" \
            "COMPARE_REF=${COMPARE_REF}" \
            "SPLIT_PACKAGES_URL=${SPLIT_PACKAGES_URL}"

      - name: Publish split packages to downloads branch
        run: |
          VERSION='${{ github.event.inputs.version }}'
          WORKTREE_DIR="downloads-branch"

          rm -rf "$WORKTREE_DIR"
          if git ls-remote --exit-code --heads origin downloads; then
            git fetch origin downloads
            git worktree add "$WORKTREE_DIR" origin/downloads
          else
            git worktree add --detach "$WORKTREE_DIR"
            git -C "$WORKTREE_DIR" checkout --orphan downloads
            git -C "$WORKTREE_DIR" rm -rf . || true
            git -C "$WORKTREE_DIR" clean -fdx
          fi

          mkdir -p "$WORKTREE_DIR/${VERSION}"
          cp -f "split-downloads/${SPLIT_ZIP_NAME}" "$WORKTREE_DIR/${VERSION}/${SPLIT_ZIP_NAME}"

          git -C "$WORKTREE_DIR" add "${VERSION}/"
          if git -C "$WORKTREE_DIR" diff --cached --quiet; then
            echo "No downloads branch changes to publish"
          else
            git -C "$WORKTREE_DIR" config user.name "github-actions[bot]"
            git -C "$WORKTREE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$WORKTREE_DIR" commit -m "Publish split packages for ${VERSION}"
            git -C "$WORKTREE_DIR" push origin HEAD:downloads
          fi

          git worktree remove --force "$WORKTREE_DIR"

      - name: Publish pre-release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: release-assets/*.ipk
          body_path: prerelease-notes.md
          prerelease: true
          overwrite_files: true
