name: Version Release Build

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: true
        default: "23.05.5"
      version:
        description: "Version of this release build."
        required: true
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: rockchip_armv8
            target: rockchip
            subtarget: armv8
          - label: x86_64
            target: x86
            subtarget: "64"

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          VER="${{ github.event.inputs.openwrt_version }}"
          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"
          if [ -z "$VER" ]; then VER="23.05.5"; fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}/${SUBTARGET}"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(xz|zst)' | head -n1)"
          if [ -z "$SDK_NAME" ]; then
            echo "Cannot find SDK from: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Apply version to Makefile
        run: |
          VERSION='${{ github.event.inputs.version }}'
          awk -v ver="$VERSION" '
            BEGIN { replaced=0 }
            /^PKG_VERSION:=/ { print "PKG_VERSION:=" ver; replaced=1; next }
            { print }
            END { if (!replaced) exit 2 }
          ' Makefile > Makefile.tmp
          mv Makefile.tmp Makefile
          grep -n '^PKG_VERSION:=' Makefile

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: Download and extract SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.event.inputs.openwrt_version || '23.05.5' }}-${{ matrix.target }}-${{ matrix.subtarget }}-v2

      - name: Update and install required feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-jxnu-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-jxnu-srun/

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-jxnu-srun=y" >> .config
          make defconfig

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-jxnu-srun/compile -j"$(nproc)"

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          SRC_IPK="$(find openwrt/bin/packages -type f -name 'luci-app-jxnu-srun*.ipk' | head -n1)"
          if [ -z "$SRC_IPK" ]; then
            echo "Failed: no ipk found."
            exit 1
          fi
          DST_IPK="artifacts/luci-app-jxnu-srun_${{ matrix.label }}.ipk"
          cp -v "$SRC_IPK" "$DST_IPK"
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jxnu-srun-ipk-${{ matrix.label }}
          path: artifacts/*.ipk

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: luci-app-jxnu-srun-ipk-*
          merge-multiple: true

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: artifacts/*.ipk
          body: |
            A new OpenWRT extension that helps you connect to JXNU SRun's network service.
            一款新的 OpenWRT 扩展程序，可帮助您连接到江西师范大学校园网。

            **This is a Stable Version release of the software.
            此版本为正式版！**

            文件介绍：
            `rockchip_armv8` 为针对armv8小型设备构建的软件包；
            `x86_64` 为针对一般x86电脑构建的软件包；
            其他框架请自行fork本项目，修改.github/workflow中build文件相关信息。
          prerelease: false
          overwrite_files: true
