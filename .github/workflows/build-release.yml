name: Version Release Build

# Builds both .ipk (opkg, OpenWrt 23.05/older) and .apk (apk, OpenWrt 24.10+
# / 25.12+) and publishes them as a single formal release with two bundle
# assets and one combined split-packages zip.
#
# Mirrors build-prerelease.yml; the only differences are that `version` is
# required, and the published release is `draft: true, prerelease: false`.

on:
  workflow_dispatch:
    inputs:
      openwrt_ipk_version:
        description: "OpenWrt release version for ipk build (opkg, e.g. 23.05.x)"
        required: true
        default: "23.05.5"
      openwrt_apk_version:
        description: "OpenWrt release version for apk build (24.10.x / 25.12.x)"
        required: true
        default: "25.12.2"
      version:
        description: "Version of this release build."
        required: true
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: ipk
            default_openwrt_version: "23.05.5"
          - format: apk
            default_openwrt_version: "25.12.2"

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          if [ "${{ matrix.format }}" = "ipk" ]; then
            VER="${{ github.event.inputs.openwrt_ipk_version }}"
          else
            VER="${{ github.event.inputs.openwrt_apk_version }}"
          fi
          if [ -z "$VER" ]; then VER="${{ matrix.default_openwrt_version }}"; fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/x86/64"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(zst|xz)' | head -n1)"
          if [ -z "$SDK_NAME" ]; then
            echo "Cannot find SDK from: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "openwrt_version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Apply version to Makefile
        run: |
          VERSION='${{ github.event.inputs.version }}'
          awk -v ver="$VERSION" '
            BEGIN { replaced=0 }
            /^PKG_VERSION:=/ { print "PKG_VERSION:=" ver; replaced=1; next }
            { print }
            END { if (!replaced) exit 2 }
          ' Makefile > Makefile.tmp
          mv Makefile.tmp Makefile
          grep -n '^PKG_VERSION:=' Makefile

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: Download and extract SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ steps.sdk.outputs.openwrt_version }}-x86-64-${{ matrix.format }}-v1

      - name: Update and install required feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-smart-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-smart-srun/

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_PACKAGE_smart-srun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smart-srun=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smart-srun-bundle=y" >> .config
          make defconfig

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-smart-srun/{clean,compile} -j1 V=s

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          EXT="${{ matrix.format }}"
          echo "=== All ${EXT} files ==="
          find openwrt/bin -type f -name "*.${EXT}" | sort
          echo "========================"

          # apk-SDK filenames use `-` as the separator (no arch suffix) so the
          # luci-app-smart-srun-*.apk glob also matches bundle-*.apk — filter
          # explicitly. ipk uses `_` so its globs are already disjoint.
          collect_one() {
            local pattern="$1"
            local exclude_prefix="$2"
            local match
            if [ -n "$exclude_prefix" ]; then
              match="$(find openwrt/bin -type f -name "$pattern" ! -name "${exclude_prefix}*" | head -n1)"
            else
              match="$(find openwrt/bin -type f -name "$pattern" | head -n1)"
            fi
            if [ -n "$match" ]; then
              cp -v "$match" "artifacts/$(basename "$match")"
            fi
          }

          if [ "${EXT}" = "ipk" ]; then
            collect_one 'smart-srun_*.ipk' ''
            collect_one 'luci-app-smart-srun_*.ipk' ''
            collect_one 'luci-app-smart-srun-bundle_*.ipk' ''
          else
            collect_one 'smart-srun-*.apk' ''
            collect_one 'luci-app-smart-srun-*.apk' 'luci-app-smart-srun-bundle-'
            collect_one 'luci-app-smart-srun-bundle-*.apk' ''
          fi

          if [ -z "$(ls artifacts/*.${EXT} 2>/dev/null)" ]; then
            echo "Failed: no ${EXT} found."
            exit 1
          fi
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-srun-${{ matrix.format }}
          path: artifacts/*.${{ matrix.format }}

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate release version
        run: |
          VERSION='${{ github.event.inputs.version }}'
          if [[ ! "$VERSION" =~ ^[A-Za-z0-9._-]+$ ]] || [[ "$VERSION" == "." ]] || [[ "$VERSION" == ".." ]] || [[ "$VERSION" == -* ]]; then
            echo "unsafe version: $VERSION"
            exit 1
          fi

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: smart-srun-*
          merge-multiple: true

      - name: Prepare unified release assets
        run: |
          VERSION='${{ github.event.inputs.version }}'
          python scripts/release_assets.py prepare-unified \
            artifacts release-assets split-downloads "$VERSION" \
            > release-assets-metadata.json

      - name: Render release notes from template
        run: |
          VERSION='${{ github.event.inputs.version }}'
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          OPENWRT_IPK='${{ github.event.inputs.openwrt_ipk_version }}'
          OPENWRT_APK='${{ github.event.inputs.openwrt_apk_version }}'
          if [ -z "$OPENWRT_IPK" ]; then OPENWRT_IPK='23.05.5'; fi
          if [ -z "$OPENWRT_APK" ]; then OPENWRT_APK='25.12.2'; fi
          OPENWRT_VERSION="ipk: ${OPENWRT_IPK} / apk: ${OPENWRT_APK}"
          SPLIT_PACKAGES_URL="$(python scripts/release_assets.py build-split-url "$OWNER" "$REPO" "$VERSION")"

          python scripts/release_assets.py render-notes \
            .github/release-template.md \
            release-notes.md \
            "VERSION=${VERSION}" \
            "OPENWRT_VERSION=${OPENWRT_VERSION}" \
            "SPLIT_PACKAGES_URL=${SPLIT_PACKAGES_URL}"

      - name: Publish split packages to downloads branch
        run: |
          VERSION='${{ github.event.inputs.version }}'
          SPLIT_ZIP_NAME="$(python -c "import json; print(json.load(open('release-assets-metadata.json', 'r', encoding='utf-8'))['split_zip_name'])")"
          WORKTREE_DIR="downloads-branch"

          rm -rf "$WORKTREE_DIR"
          if git ls-remote --exit-code --heads origin downloads; then
            git fetch origin downloads
            git worktree add "$WORKTREE_DIR" origin/downloads
          else
            git worktree add --detach "$WORKTREE_DIR"
            git -C "$WORKTREE_DIR" checkout --orphan downloads
            git -C "$WORKTREE_DIR" rm -rf . || true
            git -C "$WORKTREE_DIR" clean -fdx
          fi

          mkdir -p "$WORKTREE_DIR/${VERSION}"
          cp -f "split-downloads/${SPLIT_ZIP_NAME}" "$WORKTREE_DIR/${VERSION}/${SPLIT_ZIP_NAME}"

          git -C "$WORKTREE_DIR" add -- "${VERSION}/"
          if git -C "$WORKTREE_DIR" diff --cached --quiet; then
            echo "No downloads branch changes to publish"
          else
            git -C "$WORKTREE_DIR" config user.name "github-actions[bot]"
            git -C "$WORKTREE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$WORKTREE_DIR" commit -m "Publish split packages for ${VERSION}"
            git -C "$WORKTREE_DIR" push origin HEAD:downloads
          fi

          git worktree remove --force "$WORKTREE_DIR"

      - name: Publish release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: |
            release-assets/*.ipk
            release-assets/*.apk
          body_path: release-notes.md
          draft: true
          prerelease: false
          overwrite_files: true
