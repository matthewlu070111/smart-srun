name: pre-release build

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: false
        default: "23.05.5"
      version:
        description: "Version of this build."
        required: false
        default: ""
      publish_release:
        description: "Publish to GitHub Release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          VER="${{ github.event.inputs.openwrt_version }}"
          if [ -z "$VER" ]; then VER="23.05.5"; fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/x86/64"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(xz|zst)' | head -n1)"
          if [ -z "$SDK_NAME" ]; then
            echo "Cannot find SDK from: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Apply version to Makefile
        if: github.event.inputs.version != ''
        run: |
          VERSION='${{ github.event.inputs.version }}'
          awk -v ver="$VERSION" '
            BEGIN { replaced=0 }
            /^PKG_VERSION:=/ { print "PKG_VERSION:=" ver; replaced=1; next }
            { print }
            END { if (!replaced) exit 2 }
          ' Makefile > Makefile.tmp
          mv Makefile.tmp Makefile
          grep -n '^PKG_VERSION:=' Makefile

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: Download and extract SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.event.inputs.openwrt_version || '23.05.5' }}-x86-64-v2

      - name: Update and install required feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-jxnu-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-jxnu-srun/

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-jxnu-srun=y" >> .config
          make defconfig

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-jxnu-srun/compile -j"$(nproc)"

      - name: Collect artifact
        run: |
          mkdir -p artifacts
          SRC_IPK="$(find openwrt/bin/packages -type f -name 'luci-app-jxnu-srun*.ipk' | head -n1)"
          if [ -z "$SRC_IPK" ]; then
            echo "Failed: no ipk found."
            exit 1
          fi
          cp -v "$SRC_IPK" "artifacts/$(basename "$SRC_IPK")"
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jxnu-srun-ipk
          path: artifacts/*.ipk

  publish:
    needs: build
    if: github.event.inputs.publish_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate release version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "version is required when publish_release=true"
            exit 1
          fi

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: luci-app-jxnu-srun-ipk*
          merge-multiple: true

      - name: Render pre-release notes from template
        run: |
          VERSION='${{ github.event.inputs.version }}'
          OPENWRT_VERSION='${{ github.event.inputs.openwrt_version }}'
          if [ -z "$OPENWRT_VERSION" ]; then OPENWRT_VERSION='23.05.5'; fi
          COMPARE_REF="main...${VERSION}"

          sed \
            -e "s/\${VERSION}/${VERSION}/g" \
            -e "s/\${OPENWRT_VERSION}/${OPENWRT_VERSION}/g" \
            -e "s/\${COMPARE_REF}/${COMPARE_REF}/g" \
            .github/prerelease-template.md > prerelease-notes.md

      - name: Publish pre-release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: artifacts/*.ipk
          body_path: prerelease-notes.md
          prerelease: true
          overwrite_files: true
