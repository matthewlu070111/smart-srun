name: Build luci-app-jxnu-srun (SDK)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: false
        default: "23.05.5"
      target:
        description: "Target"
        required: false
        default: "rockchip"
      subtarget:
        description: "Subtarget"
        required: false
        default: "armv8"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          VER="${{ github.event.inputs.openwrt_version }}"
          TARGET="${{ github.event.inputs.target }}"
          SUBTARGET="${{ github.event.inputs.subtarget }}"

          if [ -z "$VER" ]; then VER="23.05.5"; fi
          if [ -z "$TARGET" ]; then TARGET="rockchip"; fi
          if [ -z "$SUBTARGET" ]; then SUBTARGET="armv8"; fi

          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}/${SUBTARGET}"
          SDK_NAME="$(curl -fsSL "${BASE_URL}/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(xz|zst)' | head -n1)"

          if [ -z "$SDK_NAME" ]; then
            echo "Cannot find SDK from: ${BASE_URL}"
            exit 1
          fi

          echo "sdk_url=${BASE_URL}/${SDK_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_name=${SDK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: ${{ runner.os }}-${{ steps.sdk.outputs.sdk_name }}

      - name: Download and extract SDK
        run: |
          if [ ! -f sdk.tar ]; then
            wget -q "${{ steps.sdk.outputs.sdk_url }}" -O sdk.tar
          fi
          mkdir -p sdk
          tar -xf sdk.tar -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mv "$SDK_DIR" openwrt

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.event.inputs.openwrt_version || '23.05.5' }}-${{ github.event.inputs.target || 'rockchip' }}-${{ github.event.inputs.subtarget || 'armv8' }}-v2

      - name: Update and install required feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update luci
          ./scripts/feeds install -p luci -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-jxnu-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "sdk" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-jxnu-srun/

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-jxnu-srun=y" >> .config
          make defconfig

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-jxnu-srun/compile -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/packages -type f -name "luci-app-jxnu-srun*.ipk" -exec cp -v {} artifacts/ \;
          if [ -z "$(ls -A artifacts)" ]; then
            echo "Failed."
            exit 1
          fi

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jxnu-srun-ipk
          path: artifacts/*.ipk
